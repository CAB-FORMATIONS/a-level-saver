services:
  - type: web
    name: a-level-saver
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn webhook_server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: PLANBOT_API_URL
        value: "https://edusign-z9iz.onrender.com"
      - key: PLANBOT_API_SECRET
        sync: false
